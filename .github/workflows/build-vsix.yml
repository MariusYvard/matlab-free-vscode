name: Build & Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GNU Octave
        run: |
          sudo apt-get update -q
          sudo apt-get install -y octave

      - name: Run compatibility tests
        run: octave --no-gui --eval "run('test/test_compat.m')"

      - name: Run figure interception tests (headless)
        run: octave --no-gui --eval "run('test/test_figures.m')"

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Copie runtime Octave dans le bundle
        run: |
          mkdir -p runtime
          cp -r ../runtime/* runtime/

      - name: Package VSIX
        run: npm run package

      - name: Upload artifact (PR / push sans tag)
        uses: actions/upload-artifact@v4
        with:
          name: matlab-free-vscode-${{ github.sha }}
          path: extension/*.vsix
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: matlab-free-vscode-${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
          body: |
            ## Installation

            1. Téléchargez le fichier `.vsix` ci-dessous
            2. Dans VS Code / Antigravity : `Ctrl+Shift+P` → **Extensions: Install from VSIX**
            3. Configurez `matlab-free.octavePath` si Octave n'est pas dans votre PATH
               (sur Windows, la détection automatique est tentée en priorité)

            ## Nouveautés v0.5.0

            Corrections de bugs critiques :
            - Interception des figures réparée. `bootstrap.m` définissait `plot`, `surf`, `mesh`... comme fonctions internes à un script. Octave ne les exposait pas globalement, donc aucun appel utilisateur n'était intercepté et aucune figure n'arrivait dans VS Code. Chaque override vit maintenant dans son propre fichier `.m` du dossier runtime/.
            - Helper `__mfv_call_real__` qui appelle la fonction Octave native via rmpath/addpath temporaire (remplace `builtin()` qui plantait sur `plot`, `surf`, etc. car ces noms ne sont pas de vrais builtins Octave).
            - Output channel : la sortie `disp()` du moteur d'exécution s'affiche enfin (MsgParser émettait `'lsp'` au lieu de `'text'`).
            - LSP : la subfunction locale `__mfv_notify__` de `lsp_loop.m` corrompait le framing JSON-RPC en écrivant sur stdout. Supprimée au profit du fichier `__mfv_notify__.m` qui passe par TCP. Le Variable Explorer fonctionne désormais.
            - Parsing URI du workspace robuste sur Linux/macOS (chemin absolu préservé).
            - `runFile` accepte `octave` en plus de `matlab`. Apostrophes échappées.
            - Handle de figure forcé en `Number` pour éviter les clés dupliquées dans `FigurePanel.panels`.
            - Tests CI : `test_figures.m` vérifie maintenant la présence de la bali