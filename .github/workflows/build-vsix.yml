name: Build & Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GNU Octave
        run: |
          sudo apt-get update -q
          sudo apt-get install -y octave

      - name: Run compatibility tests
        run: octave --no-gui --eval "run('test/test_compat.m')"

      - name: Run figure interception tests (headless)
        run: |
          octave --no-gui --eval "
            % Tests headless : on ne peut pas afficher de GUI,
            % mais on peut vérifier que les fonctions existent et s'exécutent.
            cd('${GITHUB_WORKSPACE}');
            addpath(fullfile(pwd(), 'runtime'));
            run(fullfile(pwd(), 'runtime', 'startup.m'));
            x = 0:0.1:1;
            try, plot(x, x.^2); disp('plot OK'); catch e, error(e.message); end
            try, bar([1 2 3]);   disp('bar OK');  catch e, error(e.message); end
            disp('All headless figure tests passed.')
          "

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Copie runtime Octave dans le bundle
        run: |
          mkdir -p runtime
          cp -r ../runtime/* runtime/

      - name: Package VSIX
        run: npm run package

      - name: Upload artifact (PR / push sans tag)
        uses: actions/upload-artifact@v4
        with:
          name: matlab-free-vscode-${{ github.sha }}
          path: extension/*.vsix
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: matlab-free-vscode-${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
          body: |
            ## Installation

            1. Téléchargez le fichier `.vsix` ci-dessous
            2. Dans VS Code / Antigravity : `Ctrl+Shift+P` → **Extensions: Install from VSIX**
            3. Configurez `matlab-free.octavePath` si Octave n'est pas dans votre PATH
               (sur Windows, la détection automatique est tentée en priorité)

            ## Nouveautés v0.4.1

            - **Refonte Architecturale Majeure** : Séparation des processus (LSP et exécution) pour une stabilité absolue.
            - **Auto-Healing** : Le moteur d'exécution redémarre silencieusement en cas de crash, sans bloquer l'éditeur.
            - **Communication TCP** : Protocole réseau robuste pour le transfert des figures et du workspace (remplace `stdout`).
            - **Bundling Esbuild** : L'extension est désormais ultra-légère et immunisée contre les dépendances manquantes.
            - Variable Explorer : panneau des variables du workspace en temps réel
            - Export PNG dans les panneaux 2D et 3D
            - Signature Help et complétion via Language Server
            - Auto-détection d'Octave sur Windows

            ## Prérequis
            - [GNU Octave ≥ 7.0](https://octave.org/download)
